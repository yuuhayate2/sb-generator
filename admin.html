<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KUNI ADMIN</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

:root {
--bg:#07090d;
--surface:#0d1117;
--border:#1e2d3d;
--cyan:#00e5ff;
--green:#00ff88;
--red:#ff3355;
--gold:#ffd700;
--text:#c8d8e8;
--mono:'Share Tech Mono', monospace;
--head:'Rajdhani', sans-serif;
}

body{
background:var(--bg);
color:var(--text);
font-family:var(--mono);
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.logo{
font-family:var(--head);
font-size:40px;
color:var(--cyan);
letter-spacing:4px;
margin-bottom:20px;
text-align:center;
}

.box{
background:var(--surface);
border:1px solid var(--border);
padding:20px;
margin-top:20px;
}

.title{
color:var(--cyan);
margin-bottom:10px;
letter-spacing:2px;
}

input,select{
width:100%;
padding:10px;
background:#111820;
border:1px solid #1e2d3d;
color:var(--cyan);
margin-bottom:10px;
font-family:var(--mono);
}

button{
background:transparent;
border:1px solid var(--cyan);
color:var(--cyan);
padding:10px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:var(--cyan);
color:black;
}

.key{
border:1px solid #1e2d3d;
padding:15px;
margin-top:10px;
}

.green{color:var(--green)}
.red{color:var(--red)}
.gold{color:var(--gold)}

.actions button{
margin-right:5px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="container">

<div class="logo">KUNI ADMIN</div>

<div class="box">

<div class="title">ADMIN PASSWORD</div>

<input type="password" id="password">

<button onclick="login()">LOGIN</button>

</div>

</div>

</div>

<!-- PANEL -->

<div id="panel" class="hidden">

<div class="container">

<div class="logo">KUNI ADMIN</div>

<div class="box">

<div class="title">CREATE LICENSE</div>

<select id="limit">
<option value="100">Basic - 100</option>
<option value="200">Pro - 200</option>
<option value="500">Elite - 500</option>
</select>

<input id="days" value="30">

<button onclick="createKey()">CREATE KEY</button>

</div>

<div class="box">

<div class="title">LICENSE KEYS</div>

<div id="keys"></div>

</div>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const ADMIN_PASSWORD = "anthonycarl"

const supabase = createClient(
"https://ukwltgxtfikrpsqfihi.supabase.co",
"sb_publishable_NhI5Z-LriMN_huWOV14AtA_YtmDZeQ3"
)

window.login = function(){

if(document.getElementById("password").value === ADMIN_PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

load()

}else{

alert("Wrong Password")

}

}

function generateKey(){
return "KUNI-"+Math.random().toString(36).substring(2,10).toUpperCase()
}

window.createKey = async function(){

const limit = document.getElementById("limit").value
const days = document.getElementById("days").value

const expiry = new Date()
expiry.setDate(expiry.getDate()+parseInt(days))

const key = generateKey()

await supabase.from("licenses").insert({

license_key:key,
accounts_limit:limit,
accounts_used:0,
expiry_date:expiry,
status:"active"

})

alert("Key Created: "+key)

load()

}

window.deleteKey = async function(key){

if(confirm("Delete key?")){

await supabase
.from("licenses")
.delete()
.eq("license_key",key)

load()

}

}

window.disableKey = async function(key){

await supabase
.from("licenses")
.update({status:"disabled"})
.eq("license_key",key)

load()

}

window.enableKey = async function(key){

await supabase
.from("licenses")
.update({status:"active"})
.eq("license_key",key)

load()

}

async function load(){

const {data} = await supabase
.from("licenses")
.select("*")
.order("created_at",{ascending:false})

document.getElementById("keys").innerHTML =
data.map(k=>`

<div class="key">

<div class="gold">${k.license_key}</div>

<div>
Limit: ${k.accounts_limit}
</div>

<div>
Used: ${k.accounts_used}
</div>

<div>
HWID: ${k.hwid || "Not Used"}
</div>

<div>
Status: ${k.status === "active" ? "<span class='green'>ACTIVE</span>" : "<span class='red'>DISABLED</span>"}
</div>

<div>
Expires: ${new Date(k.expiry_date).toLocaleDateString()}
</div>

<div class="actions">

<button onclick="disableKey('${k.license_key}')">Disable</button>

<button onclick="enableKey('${k.license_key}')">Enable</button>

<button onclick="deleteKey('${k.license_key}')">Delete</button>

</div>

</div>

`).join("")

}

</script>

</body>
</html>
